# Render Blueprint — POS API (Express + Socket.io + Prisma)
# วิธีใช้: Render Dashboard → New → Blueprint → เลือก repo นี้
# จากนั้นกรอกค่า env ที่ sync:false ในหน้า dashboard
#
# หมายเหตุ: plan free จะ "หลับ" เมื่อไม่มีทราฟฟิก (cold start ~50 วิ)
# สำหรับร้านที่เปิดใช้ทั้งวัน + ใช้ realtime (Socket.io) แนะนำเปลี่ยนเป็น plan: starter
services:
  - type: web
    name: pos-api
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    # ลบ lockfile ก่อนติดตั้ง: lockfile ถูกสร้างจาก Windows ทำให้ npm ไม่ลง native binary
    # ของ sharp สำหรับ linux-x64 (bug ของ npm กับ optional deps ข้าม platform).
    # การ resolve ใหม่บน Linux จะลง @img/sharp-linux-x64 ให้ถูกต้อง.
    # version สำคัญถูก pin ใน package.json แล้ว (typescript 5.9.3 เป๊ะ, @types ^4) จึงยัง deterministic
    buildCommand: rm -f package-lock.json && npm install && npm run build --workspace=apps/api
    startCommand: npm run start --workspace=apps/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: WEB_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Supabase Storage — เก็บรูปสินค้าถาวร (กันรูปหายตอน redeploy)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
